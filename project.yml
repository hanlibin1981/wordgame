name: WordGame
options:
  bundleIdPrefix: com.wordgame
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_ENTITLEMENTS: ""

targets:
  WordGame:
    type: application
    platform: macOS
    sources:
      - path: WordGame
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordgame.app
        INFOPLIST_FILE: WordGame/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - package: SQLite.swift
        product: SQLite

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.3"
